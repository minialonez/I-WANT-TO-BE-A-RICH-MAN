<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Logic Designer — Team Edition</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root {
  --bg-deep:#08080d;--bg-canvas:#0e0e16;--bg-surface:#161620;--bg-elevated:#1e1e2a;
  --bg-hover:#282838;--bg-input:#121218;--border:#2a2a3c;--border-active:#4a4a6a;
  --text-primary:#e4e4f0;--text-secondary:#9090a8;--text-dim:#555568;
  --accent:#7c6aef;--accent-glow:rgba(124,106,239,.3);--accent-dim:rgba(124,106,239,.12);
  --danger:#ef4444;--success:#22c55e;--warning:#eab308;--info:#38bdf8;
  --node-red:#ef4444;--node-blue:#3b82f6;--node-green:#22c55e;--node-orange:#f97316;
  --node-purple:#a855f7;--node-teal:#14b8a6;--node-pink:#ec4899;--node-gray:#6b7280;
  --shadow:0 4px 24px rgba(0,0,0,.6);--radius:10px;
  --font:'Noto Sans Thai',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg-deep);color:var(--text-primary);overflow:hidden;height:100vh;width:100vw;-webkit-user-select:none;user-select:none}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── TOOLBAR ── */
#toolbar{position:fixed;top:0;left:0;right:0;height:48px;background:var(--bg-surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;z-index:1000;gap:4px}
.logo{font-weight:700;font-size:14px;color:var(--accent);margin-right:8px;display:flex;align-items:center;gap:6px;white-space:nowrap}
.logo svg{width:20px;height:20px;flex-shrink:0}
.tb-d{width:1px;height:24px;background:var(--border);margin:0 6px}
.tb{display:flex;align-items:center;gap:5px;padding:5px 10px;background:0 0;border:1px solid transparent;color:var(--text-secondary);font-family:var(--font);font-size:12px;font-weight:500;border-radius:6px;cursor:pointer;transition:.15s;white-space:nowrap}
.tb:hover{background:var(--bg-hover);color:var(--text-primary);border-color:var(--border)}
.tb.on{background:var(--accent-dim);color:var(--accent);border-color:rgba(124,106,239,.3)}
.tb.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.tb.primary:hover{filter:brightness(1.15);box-shadow:0 0 14px var(--accent-glow)}
.tb svg{width:15px;height:15px;flex-shrink:0}
.spacer{flex:1}
#zoom-info{font-family:var(--mono);font-size:10px;color:var(--text-dim);min-width:44px;text-align:center}

/* ── PRESENCE BAR ── */
#presence-bar{display:flex;align-items:center;gap:2px;margin-left:8px}
.user-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;border:2px solid var(--bg-surface);cursor:default;position:relative;transition:.15s}
.user-avatar:hover{transform:scale(1.15);z-index:10}
.user-avatar .tooltip{position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);background:var(--bg-elevated);border:1px solid var(--border);padding:3px 8px;border-radius:4px;font-size:10px;font-weight:400;color:var(--text-primary);white-space:nowrap;pointer-events:none;opacity:0;transition:.15s}
.user-avatar:hover .tooltip{opacity:1}
.user-avatar.me{border-color:var(--accent)}

/* ── CANVAS ── */
#cc{position:fixed;top:48px;left:0;right:0;bottom:0;overflow:hidden;cursor:grab;background:var(--bg-canvas)}
#cc:active{cursor:grabbing}
#cc.connecting{cursor:crosshair!important}
#cv{position:absolute;transform-origin:0 0;width:8000px;height:8000px}
#grid{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;
  background-image:linear-gradient(rgba(50,50,80,.18) 1px,transparent 1px),linear-gradient(90deg,rgba(50,50,80,.18) 1px,transparent 1px),linear-gradient(rgba(50,50,80,.32) 1px,transparent 1px),linear-gradient(90deg,rgba(50,50,80,.32) 1px,transparent 1px);
  background-size:20px 20px,20px 20px,100px 100px,100px 100px}
#conn-svg,#temp-svg{position:absolute;top:0;left:0;width:8000px;height:8000px;pointer-events:none;z-index:1}
#conn-svg path{pointer-events:stroke;cursor:pointer}
#conn-svg path:hover{stroke-width:3.5!important;filter:drop-shadow(0 0 5px currentColor)}
#sel-box{position:absolute;border:1.5px dashed var(--accent);background:rgba(124,106,239,.06);pointer-events:none;z-index:50;display:none;border-radius:2px}

/* ── NODE ── */
.nd{position:absolute;min-width:210px;max-width:320px;background:var(--bg-surface);border:1.5px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);z-index:10;transition:box-shadow .2s}
.nd:hover{box-shadow:0 8px 32px rgba(0,0,0,.7)}
.nd.selected{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-glow),var(--shadow);z-index:20}
.nd.locked-other{opacity:.7}
.nd-lock{position:absolute;top:-10px;right:-10px;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;z-index:25;border:2px solid var(--bg-surface);box-shadow:0 2px 8px rgba(0,0,0,.4)}
.nd-lock .lock-tip{position:absolute;top:28px;right:0;background:var(--bg-elevated);border:1px solid var(--border);padding:4px 8px;border-radius:4px;font-size:10px;font-weight:400;white-space:nowrap;display:none;color:var(--text-primary)}
.nd-lock:hover .lock-tip{display:block}
.nd-hd{display:flex;align-items:center;padding:8px 10px;border-radius:var(--radius) var(--radius) 0 0;cursor:move;gap:7px;position:relative}
.nd-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.nd-title{flex:1;font-size:13px;font-weight:600;background:0 0;border:0;color:var(--text-primary);font-family:var(--font);outline:0;min-width:50px}
.nd-title::placeholder{color:var(--text-dim)}
.nd-mbtn{width:22px;height:22px;display:flex;align-items:center;justify-content:center;border:0;background:0 0;color:var(--text-dim);cursor:pointer;border-radius:4px;transition:.15s;flex-shrink:0}
.nd-mbtn:hover{background:var(--bg-hover);color:var(--text-primary)}
.nd-body{padding:0 10px 8px}
.bullet-row{display:flex;align-items:flex-start;gap:6px;padding:2px 0;border-radius:4px;cursor:pointer;transition:background .1s}
.bullet-row:hover{background:var(--bg-hover)}
.bullet-row.has-detail .b-text{color:var(--text-primary);font-weight:500}
.bullet-row .b-dot{width:5px;height:5px;border-radius:50%;background:var(--text-dim);margin-top:8px;flex-shrink:0}
.bullet-row .b-text{flex:1;background:0 0;border:0;color:var(--text-secondary);font-family:var(--font);font-size:12px;outline:0;padding:2px 0}
.bullet-row .b-text::placeholder{color:var(--text-dim)}
.bullet-row .b-expand{width:16px;height:16px;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:10px;flex-shrink:0;margin-top:3px;opacity:0;transition:.15s}
.bullet-row:hover .b-expand{opacity:1}
.bullet-row.has-detail .b-expand{opacity:.6;color:var(--accent)}
.b-rm{width:16px;height:16px;display:flex;align-items:center;justify-content:center;background:0 0;border:0;color:var(--text-dim);cursor:pointer;border-radius:3px;font-size:13px;opacity:0;transition:.15s;flex-shrink:0;margin-top:2px}
.bullet-row:hover .b-rm{opacity:1}
.b-rm:hover{color:var(--danger);background:rgba(239,68,68,.1)}
.add-b{display:flex;align-items:center;gap:5px;padding:4px 6px;margin-top:3px;background:0 0;border:1px dashed var(--border);color:var(--text-dim);font-family:var(--font);font-size:11px;border-radius:5px;cursor:pointer;width:100%;transition:.15s}
.add-b:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}

/* Ports */
.port{position:absolute;width:12px;height:12px;border-radius:50%;background:var(--bg-elevated);border:2px solid var(--border);cursor:crosshair;z-index:15;transition:.15s;opacity:0}
.nd:hover .port,.connecting .port{opacity:1}
.port:hover,.port.on{border-color:var(--accent);background:var(--accent);box-shadow:0 0 8px var(--accent-glow);transform:scale(1.3)}
.port.top{top:-6px;left:50%;margin-left:-6px}
.port.bottom{bottom:-6px;left:50%;margin-left:-6px}
.port.left{left:-6px;top:50%;margin-top:-6px}
.port.right{right:-6px;top:50%;margin-top:-6px}

/* ── DETAIL PANEL ── */
#detail-panel{position:fixed;top:48px;right:0;width:360px;height:calc(100vh - 48px);background:var(--bg-surface);border-left:1px solid var(--border);z-index:900;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:-4px 0 24px rgba(0,0,0,.4)}
#detail-panel.open{transform:translateX(0)}
.dp-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.dp-header h3{flex:1;font-size:14px;font-weight:600}
.dp-close{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:0 0;border:1px solid var(--border);color:var(--text-secondary);cursor:pointer;border-radius:6px;font-size:16px;transition:.15s}
.dp-close:hover{background:var(--bg-hover);color:var(--text-primary)}
.dp-body{flex:1;overflow-y:auto;padding:16px}
.dp-section{margin-bottom:16px}
.dp-label{font-size:11px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.dp-textarea{width:100%;min-height:80px;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;padding:10px;color:var(--text-primary);font-family:var(--font);font-size:12.5px;line-height:1.6;outline:0;resize:vertical;transition:border-color .15s}
.dp-textarea:focus{border-color:var(--accent)}
.dp-textarea::placeholder{color:var(--text-dim)}

/* Sub-bullets in detail */
.sub-list{margin-top:4px}
.sub-row{display:flex;align-items:center;gap:6px;padding:3px 0}
.sub-row .sub-check{width:15px;height:15px;border-radius:4px;border:1.5px solid var(--border);background:0 0;cursor:pointer;display:flex;align-items:center;justify-content:center;color:transparent;font-size:10px;transition:.15s;flex-shrink:0}
.sub-row .sub-check.done{background:var(--success);border-color:var(--success);color:#fff}
.sub-row input{flex:1;background:0 0;border:0;color:var(--text-secondary);font-family:var(--font);font-size:12px;outline:0;padding:2px 0}
.sub-row .sub-rm{width:16px;height:16px;display:flex;align-items:center;justify-content:center;background:0 0;border:0;color:var(--text-dim);cursor:pointer;font-size:12px;opacity:0;transition:.15s;border-radius:3px;flex-shrink:0}
.sub-row:hover .sub-rm{opacity:1}
.sub-row .sub-rm:hover{color:var(--danger)}
.add-sub{display:flex;align-items:center;gap:4px;padding:4px 6px;margin-top:4px;background:0 0;border:1px dashed var(--border);color:var(--text-dim);font-family:var(--font);font-size:11px;border-radius:4px;cursor:pointer;transition:.15s}
.add-sub:hover{border-color:var(--accent);color:var(--accent)}

/* Status badge */
.status-bar{display:flex;gap:4px;flex-wrap:wrap}
.status-opt{padding:4px 10px;border-radius:12px;border:1px solid var(--border);background:0 0;color:var(--text-secondary);font-family:var(--font);font-size:11px;cursor:pointer;transition:.15s}
.status-opt:hover{border-color:var(--text-secondary)}
.status-opt.active-todo{background:rgba(234,179,8,.12);border-color:var(--warning);color:var(--warning)}
.status-opt.active-doing{background:rgba(56,189,248,.12);border-color:var(--info);color:var(--info)}
.status-opt.active-done{background:rgba(34,197,94,.12);border-color:var(--success);color:var(--success)}

/* ── ACTIVITY PANEL ── */
#activity-panel{position:fixed;top:48px;left:0;width:280px;height:calc(100vh - 48px);background:var(--bg-surface);border-right:1px solid var(--border);z-index:900;transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:4px 0 24px rgba(0,0,0,.4)}
#activity-panel.open{transform:translateX(0)}
.ap-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.ap-header h3{flex:1;font-size:14px;font-weight:600}
.ap-body{flex:1;overflow-y:auto;padding:8px}
.act-item{display:flex;gap:8px;padding:8px;border-radius:6px;transition:.15s}
.act-item:hover{background:var(--bg-hover)}
.act-ava{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;margin-top:2px}
.act-content{flex:1;font-size:12px;color:var(--text-secondary);line-height:1.5}
.act-content strong{color:var(--text-primary);font-weight:600}
.act-time{font-size:10px;color:var(--text-dim);margin-top:2px;font-family:var(--mono)}

/* ── CONTEXT MENU ── */
.ctx{position:fixed;background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;padding:4px;z-index:5000;min-width:170px;box-shadow:0 8px 32px rgba(0,0,0,.6);animation:mIn .12s ease-out}
@keyframes mIn{from{opacity:0;transform:scale(.95) translateY(-4px)}to{opacity:1;transform:scale(1) translateY(0)}}
.ctx-i{display:flex;align-items:center;gap:7px;padding:6px 10px;border:0;background:0 0;color:var(--text-secondary);font-family:var(--font);font-size:12px;cursor:pointer;border-radius:5px;width:100%;text-align:left;transition:.1s}
.ctx-i:hover{background:var(--bg-hover);color:var(--text-primary)}
.ctx-i.danger:hover{background:rgba(239,68,68,.1);color:var(--danger)}
.ctx-sep{height:1px;background:var(--border);margin:4px 8px}
.ctx-colors{display:flex;gap:3px;padding:5px 10px;flex-wrap:wrap}
.ctx-cs{width:18px;height:18px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:.15s}
.ctx-cs:hover{transform:scale(1.25);border-color:#fff}
.ctx-cs.on{border-color:#fff;box-shadow:0 0 6px rgba(255,255,255,.3)}

/* ── MODAL ── */
.modal-o{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:9000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg-surface);border:1px solid var(--border);border-radius:14px;width:92%;max-width:700px;max-height:82vh;box-shadow:0 20px 60px rgba(0,0,0,.8);animation:modIn .25s ease-out;display:flex;flex-direction:column}
@keyframes modIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.mod-h{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.mod-h h2{font-size:15px;font-weight:600}
.mod-x{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:0 0;border:1px solid var(--border);color:var(--text-secondary);cursor:pointer;border-radius:6px;font-size:16px;transition:.15s}
.mod-x:hover{background:var(--bg-hover);color:var(--text-primary)}
.mod-b{padding:16px 20px;overflow-y:auto;flex:1}
.mod-b pre{background:var(--bg-deep);border:1px solid var(--border);border-radius:8px;padding:14px;font-family:var(--mono);font-size:11.5px;line-height:1.7;color:var(--text-secondary);white-space:pre-wrap;word-break:break-word;max-height:50vh;overflow-y:auto}
.mod-f{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:6px;justify-content:flex-end}

/* ── ONBOARD MODAL ── */
.onboard{text-align:center;padding:30px 20px!important}
.onboard h2{font-size:20px;font-weight:700;margin-bottom:6px}
.onboard p{color:var(--text-secondary);font-size:13px;margin-bottom:20px}
.onboard input{width:220px;padding:10px 14px;background:var(--bg-input);border:1.5px solid var(--border);border-radius:8px;color:var(--text-primary);font-family:var(--font);font-size:14px;text-align:center;outline:0;transition:border .15s}
.onboard input:focus{border-color:var(--accent)}
.onboard .avatar-pick{display:flex;gap:6px;justify-content:center;margin:16px 0}
.onboard .av-opt{width:36px;height:36px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;transition:.15s}
.onboard .av-opt:hover{transform:scale(1.15)}
.onboard .av-opt.on{border-color:#fff;box-shadow:0 0 12px rgba(255,255,255,.3)}
.onboard .start-btn{margin-top:20px;padding:10px 32px;background:var(--accent);color:#fff;border:0;border-radius:8px;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
.onboard .start-btn:hover{filter:brightness(1.15)}

/* ── MINIMAP ── */
#minimap{position:fixed;bottom:12px;right:12px;width:160px;height:100px;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;z-index:500;overflow:hidden;box-shadow:var(--shadow)}
#minimap canvas{width:100%;height:100%}

/* ── TOAST ── */
.toast{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);background:var(--bg-elevated);border:1px solid var(--border);padding:8px 18px;border-radius:8px;font-size:12.5px;color:var(--text-primary);z-index:8000;box-shadow:var(--shadow);animation:tIn .3s ease-out}
@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── HELP ── */
#help{position:fixed;bottom:12px;left:12px;display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;font-size:10px;color:var(--text-dim);z-index:500}
#help kbd{background:var(--bg-hover);border:1px solid var(--border);padding:1px 4px;border-radius:3px;font-family:var(--mono);font-size:9px;color:var(--text-secondary)}

.conn-label{position:absolute;background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-secondary);font-size:10px;padding:2px 7px;border-radius:4px;pointer-events:auto;cursor:pointer;z-index:2;font-family:var(--font);white-space:nowrap}
.conn-label:hover{border-color:var(--accent);color:var(--text-primary)}
</style>
</head>
<body>

<div id="toolbar">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
    Logic Designer
  </div>
  <div class="tb-d"></div>
  <button class="tb" onclick="addNode()" title="N"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="3"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>เพิ่มกล่อง</button>
  <button class="tb" id="conn-btn" onclick="toggleConn()" title="C"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="5" cy="12" r="2.5"/><circle cx="19" cy="12" r="2.5"/><path d="M7.5 12h9" stroke-dasharray="3 2"/></svg>เชื่อมต่อ</button>
  <div class="tb-d"></div>
  <button class="tb" onclick="zoomTo(S+.15)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/><line x1="8" y1="11" x2="14" y2="11"/><line x1="11" y1="8" x2="11" y2="14"/></svg></button>
  <span id="zoom-info">100%</span>
  <button class="tb" onclick="zoomTo(S-.15)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/><line x1="8" y1="11" x2="14" y2="11"/></svg></button>
  <button class="tb" onclick="fitView()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></button>
  <div class="tb-d"></div>
  <button class="tb" id="act-btn" onclick="toggleActivity()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/></svg>กิจกรรม</button>
  <div class="spacer"></div>
  <div id="presence-bar"></div>
  <div class="tb-d"></div>
  <button class="tb" onclick="saveFile()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>บันทึก</button>
  <button class="tb" onclick="loadFile()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>โหลด</button>
  <div class="tb-d"></div>
  <button class="tb primary" onclick="exportMap()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Export</button>
</div>

<div id="cc">
  <div id="cv">
    <div id="grid"></div>
    <svg id="conn-svg"></svg>
    <svg id="temp-svg"><path d="" stroke="var(--accent)" stroke-width="2" fill="none" stroke-dasharray="6 4"/></svg>
    <div id="sel-box"></div>
  </div>
</div>

<div id="detail-panel">
  <div class="dp-header">
    <div id="dp-dot" style="width:10px;height:10px;border-radius:50%"></div>
    <h3 id="dp-title">รายละเอียด</h3>
    <button class="dp-close" onclick="closeDetail()">×</button>
  </div>
  <div class="dp-body" id="dp-body"></div>
</div>

<div id="activity-panel">
  <div class="ap-header">
    <h3>กิจกรรมทีม</h3>
    <button class="dp-close" onclick="toggleActivity()">×</button>
  </div>
  <div class="ap-body" id="act-list"></div>
</div>

<div id="minimap"><canvas id="mm-c"></canvas></div>
<div id="help"><kbd>N</kbd> เพิ่ม <kbd>C</kbd> เชื่อม <kbd>Del</kbd> ลบ <kbd>Shift+ลาก</kbd> เลือกหลายกล่อง <kbd>คลิกรายการ</kbd> ดูรายละเอียด</div>
<input type="file" id="fi" accept=".json" style="display:none">

<script>
// ══════════ STATE ══════════
let nodes=[],conns=[],NID=1,CID=1,S=1,PX=0,PY=0;
let isPan=false,psx,psy,connMode=false,cFrom=null,cPort=null;
let selNodes=new Set(),dragN=null,dox,doy,mdo={};
let isSel=false,ssx,ssy;
let activities=[];
const COLORS=[
  {n:'แดง (ขาย)',v:'#ef4444'},{n:'น้ำเงิน (บัญชี)',v:'#3b82f6'},{n:'เขียว (คลัง)',v:'#22c55e'},
  {n:'ส้ม (จัดซื้อ)',v:'#f97316'},{n:'ม่วง (บริหาร)',v:'#a855f7'},{n:'ฟ้าเขียว',v:'#14b8a6'},
  {n:'ชมพู',v:'#ec4899'},{n:'เทา',v:'#6b7280'}
];
const AVATARS=['#ef4444','#3b82f6','#22c55e','#f97316','#a855f7','#14b8a6','#ec4899','#eab308'];
let me={name:'',color:'#3b82f6',id:''};
let teamUsers={};
let detailOpen=null; // {nodeId, bulletIdx}
const cv=document.getElementById('cv'),cc=document.getElementById('cc');
const cSvg=document.getElementById('conn-svg'),tSvg=document.getElementById('temp-svg');
let bc=null;
try{bc=new BroadcastChannel('bld-collab')}catch(e){}

// ══════════ ONBOARDING ══════════
function showOnboard(){
  const o=document.createElement('div');o.className='modal-o';o.id='onboard-modal';
  let avHtml=AVATARS.map((c,i)=>`<div class="av-opt ${i===1?'on':''}" data-c="${c}" style="background:${c}" onclick="pickAv(this,'${c}')"></div>`).join('');
  o.innerHTML=`<div class="modal" style="max-width:400px"><div class="onboard">
    <h2>สวัสดี!</h2>
    <p>กรอกชื่อเพื่อเริ่มทำงานกับทีม</p>
    <input id="ob-name" placeholder="ชื่อของคุณ..." autofocus>
    <div class="avatar-pick">${avHtml}</div>
    <button class="start-btn" onclick="startSession()">เริ่มทำงาน</button>
  </div></div>`;
  document.body.appendChild(o);
  document.getElementById('ob-name').addEventListener('keydown',e=>{if(e.key==='Enter')startSession()});
}
function pickAv(el,c){document.querySelectorAll('.av-opt').forEach(x=>x.classList.remove('on'));el.classList.add('on');me.color=c}
function startSession(){
  const name=document.getElementById('ob-name').value.trim();
  if(!name){document.getElementById('ob-name').style.borderColor='var(--danger)';return}
  me.name=name;me.id=Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  try{localStorage.setItem('bld_me',JSON.stringify(me))}catch(e){}
  document.getElementById('onboard-modal').remove();
  initApp();
  broadcastPresence();
  addActivity('เข้าร่วมการทำงาน');
}

// ══════════ TRANSFORM ══════════
function updateTx(){cv.style.transform=`translate(${PX}px,${PY}px) scale(${S})`;document.getElementById('zoom-info').textContent=Math.round(S*100)+'%';updateMM()}
function zoomTo(ns,cx,cy){ns=Math.max(.12,Math.min(3,ns));if(cx!==undefined){PX=cx-(cx-PX)*(ns/S);PY=cy-(cy-PY)*(ns/S)};S=ns;updateTx()}
function fitView(){
  if(!nodes.length){S=1;PX=100;PY=100;updateTx();return}
  let x1=1e9,y1=1e9,x2=-1e9,y2=-1e9;
  nodes.forEach(n=>{const e=document.getElementById('n-'+n.id);const w=e?e.offsetWidth:220;const h=e?e.offsetHeight:140;
    x1=Math.min(x1,n.x);y1=Math.min(y1,n.y);x2=Math.max(x2,n.x+w);y2=Math.max(y2,n.y+h)});
  const p=80,cw=cc.clientWidth,ch=cc.clientHeight;S=Math.min(cw/((x2-x1)+p*2),ch/((y2-y1)+p*2),1.5);
  PX=(cw-(x2-x1+p*2)*S)/2-(x1-p)*S;PY=(ch-(y2-y1+p*2)*S)/2-(y1-p)*S;updateTx()
}

// ══════════ CANVAS EVENTS ══════════
cc.addEventListener('mousedown',e=>{
  if(e.target===cc||e.target===cv||e.target.id==='grid'){
    if(e.button===0&&!connMode&&!e.shiftKey){isPan=true;psx=e.clientX-PX;psy=e.clientY-PY;clearSel()}
    if(e.button===0&&e.shiftKey){isSel=true;const r=cc.getBoundingClientRect();ssx=(e.clientX-r.left-PX)/S;ssy=(e.clientY-r.top-PY)/S;
      const b=document.getElementById('sel-box');b.style.display='block';b.style.left=ssx+'px';b.style.top=ssy+'px';b.style.width='0';b.style.height='0'}
    if(e.button===0&&connMode){toggleConn(false)}
    closeMenus()
  }
});
cc.addEventListener('mousemove',e=>{
  if(isPan){PX=e.clientX-psx;PY=e.clientY-psy;updateTx()}
  if(isSel){const r=cc.getBoundingClientRect();const cx=(e.clientX-r.left-PX)/S;const cy=(e.clientY-r.top-PY)/S;
    const b=document.getElementById('sel-box');b.style.left=Math.min(ssx,cx)+'px';b.style.top=Math.min(ssy,cy)+'px';b.style.width=Math.abs(cx-ssx)+'px';b.style.height=Math.abs(cy-ssy)+'px'}
  if(cFrom&&connMode){const r=cc.getBoundingClientRect();const mx=(e.clientX-r.left-PX)/S;const my=(e.clientY-r.top-PY)/S;
    const fp=portPos(cFrom,cPort);tSvg.querySelector('path').setAttribute('d',curvePath(fp.x,fp.y,mx,my))}
  if(dragN){const r=cc.getBoundingClientRect();const mx=(e.clientX-r.left-PX)/S;const my=(e.clientY-r.top-PY)/S;
    if(selNodes.size>1&&selNodes.has(dragN.id)){selNodes.forEach(id=>{const n=nodes.find(x=>x.id===id);if(n&&mdo[id]){n.x=mx+mdo[id].dx;n.y=my+mdo[id].dy;posN(n)}})}
    else{dragN.x=mx-dox;dragN.y=my-doy;posN(dragN)}
    renderConns()}
});
cc.addEventListener('mouseup',()=>{
  isPan=false;if(dragN){broadcastState();dragN=null}
  if(isSel){isSel=false;const b=document.getElementById('sel-box');const bx=+b.style.left.replace('px',''),by=+b.style.top.replace('px',''),bw=+b.style.width.replace('px',''),bh=+b.style.height.replace('px','');
    b.style.display='none';selNodes.clear();
    nodes.forEach(n=>{const e=document.getElementById('n-'+n.id);if(!e)return;if(n.x+e.offsetWidth>bx&&n.x<bx+bw&&n.y+e.offsetHeight>by&&n.y<by+bh)selNodes.add(n.id)});
    updateSelVis()}
});
cc.addEventListener('wheel',e=>{e.preventDefault();const r=cc.getBoundingClientRect();zoomTo(S+(e.deltaY>0?-.08:.08),e.clientX-r.left,e.clientY-r.top)},{passive:false});
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.key==='n'||e.key==='N')addNode();if(e.key==='c'||e.key==='C')toggleConn();
  if(e.key==='Delete'||e.key==='Backspace')delSelected();if(e.key==='Escape'){toggleConn(false);clearSel();closeMenus();closeDetail()}
  if(e.ctrlKey&&e.key==='s'){e.preventDefault();saveFile()}
});

// ══════════ NODES ══════════
function addNode(x,y,title,color,bullets){
  const id=NID++;
  if(x===undefined){const r=cc.getBoundingClientRect();x=(-PX+r.width/2)/S-105;y=(-PY+r.height/2)/S-60}
  const n={id,x:x||200,y:y||200,title:title||'',color:color||COLORS[0].v,
    bullets:bullets||[{text:'',desc:'',subs:[],status:''}],lockedBy:null};
  nodes.push(n);renderNode(n);broadcastState();return n
}

function renderNode(n){
  const old=document.getElementById('n-'+n.id);if(old)old.remove();
  const el=document.createElement('div');el.className='nd'+(selNodes.has(n.id)?' selected':'');
  el.id='n-'+n.id;el.style.left=n.x+'px';el.style.top=n.y+'px';
  if(n.lockedBy&&n.lockedBy!==me.id)el.classList.add('locked-other');

  // Lock indicator
  if(n.lockedBy){
    const user=n.lockedBy===me.id?me:(teamUsers[n.lockedBy]||{name:'?',color:'#666'});
    const lk=document.createElement('div');lk.className='nd-lock';lk.style.background=user.color;
    lk.textContent=user.name.charAt(0).toUpperCase();
    lk.innerHTML+=`<div class="lock-tip">🔒 ${user.name} กำลังแก้ไข</div>`;
    el.appendChild(lk);
  }

  // Ports
  ['top','bottom','left','right'].forEach(p=>{const d=document.createElement('div');d.className='port '+p;d.dataset.nid=n.id;d.dataset.port=p;
    d.addEventListener('mousedown',onPortDown);d.addEventListener('mouseup',onPortUp);el.appendChild(d)});

  // Header
  const hd=document.createElement('div');hd.className='nd-hd';hd.style.borderBottom='2px solid '+n.color;
  const dot=document.createElement('div');dot.className='nd-dot';dot.style.background=n.color;
  const ti=document.createElement('input');ti.className='nd-title';ti.value=n.title;ti.placeholder='ชื่อกล่อง...';
  ti.addEventListener('input',()=>{n.title=ti.value;broadcastState()});
  ti.addEventListener('mousedown',e=>e.stopPropagation());
  ti.addEventListener('focus',()=>selectN(n.id));
  // Lock on focus
  ti.addEventListener('focus',()=>{lockNode(n.id)});
  ti.addEventListener('blur',()=>{unlockNode(n.id)});

  const mb=document.createElement('button');mb.className='nd-mbtn';
  mb.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>';
  mb.addEventListener('click',e=>{e.stopPropagation();showNodeMenu(n,e)});

  hd.append(dot,ti,mb);
  hd.addEventListener('mousedown',e=>{
    if(e.target===ti||e.target===mb||e.target.closest('.nd-mbtn'))return;
    if(n.lockedBy&&n.lockedBy!==me.id){toast(`🔒 ${(teamUsers[n.lockedBy]||{name:'ผู้ใช้อื่น'}).name} กำลังแก้ไขกล่องนี้`);return}
    e.stopPropagation();if(!selNodes.has(n.id)&&!e.shiftKey)clearSel();selectN(n.id);
    dragN=n;const r=cc.getBoundingClientRect();const mx=(e.clientX-r.left-PX)/S;const my=(e.clientY-r.top-PY)/S;
    dox=mx-n.x;doy=my-n.y;mdo={};
    if(selNodes.size>1)selNodes.forEach(id=>{const nd=nodes.find(x=>x.id===id);if(nd)mdo[id]={dx:nd.x-mx,dy:nd.y-my}})
  });
  el.appendChild(hd);

  // Body
  const body=document.createElement('div');body.className='nd-body';
  renderBullets(n,body);
  el.appendChild(body);
  cv.appendChild(el);
}

function renderBullets(n,body){
  body.innerHTML='';
  n.bullets.forEach((b,i)=>{
    const row=document.createElement('div');row.className='bullet-row';
    if(b.desc||b.subs.length)row.classList.add('has-detail');

    const bdot=document.createElement('div');bdot.className='b-dot';
    if(b.status==='doing')bdot.style.background='var(--info)';
    else if(b.status==='done'){bdot.style.background='var(--success)'}

    const inp=document.createElement('input');inp.className='b-text';inp.value=b.text;inp.placeholder='รายละเอียด...';
    inp.addEventListener('input',()=>{b.text=inp.value;broadcastState()});
    inp.addEventListener('mousedown',e=>e.stopPropagation());
    inp.addEventListener('focus',()=>{lockNode(n.id)});
    inp.addEventListener('blur',()=>{unlockNode(n.id)});
    inp.addEventListener('keydown',e=>{
      if(e.key==='Enter'){n.bullets.splice(i+1,0,{text:'',desc:'',subs:[],status:''});renderBullets(n,body);
        body.querySelectorAll('.b-text')[i+1]?.focus();broadcastState()}
      if(e.key==='Backspace'&&!inp.value&&n.bullets.length>1){e.preventDefault();n.bullets.splice(i,1);renderBullets(n,body);
        body.querySelectorAll('.b-text')[Math.max(0,i-1)]?.focus();broadcastState()}
    });

    const expand=document.createElement('div');expand.className='b-expand';expand.textContent='▸';expand.title='ดูรายละเอียด';
    expand.addEventListener('click',e=>{e.stopPropagation();openDetail(n.id,i)});

    const rm=document.createElement('button');rm.className='b-rm';rm.textContent='×';
    rm.addEventListener('click',e=>{e.stopPropagation();if(n.bullets.length>1){n.bullets.splice(i,1);renderBullets(n,body);broadcastState()}});

    row.append(bdot,inp,expand,rm);
    row.addEventListener('dblclick',e=>{if(e.target===inp)return;openDetail(n.id,i)});
    body.appendChild(row);
  });

  const addBtn=document.createElement('button');addBtn.className='add-b';
  addBtn.innerHTML='<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> เพิ่มรายการ';
  addBtn.addEventListener('click',e=>{e.stopPropagation();n.bullets.push({text:'',desc:'',subs:[],status:''});renderBullets(n,body);
    const inputs=body.querySelectorAll('.b-text');inputs[inputs.length-1]?.focus();broadcastState()});
  body.appendChild(addBtn);
  renderConns();
}

function posN(n){const e=document.getElementById('n-'+n.id);if(e){e.style.left=n.x+'px';e.style.top=n.y+'px'}}
function selectN(id){selNodes.add(id);updateSelVis()}
function clearSel(){selNodes.clear();updateSelVis()}
function updateSelVis(){document.querySelectorAll('.nd').forEach(e=>{const id=+e.id.replace('n-','');e.classList.toggle('selected',selNodes.has(id))})}
function delSelected(){if(!selNodes.size)return;selNodes.forEach(id=>{nodes=nodes.filter(n=>n.id!==id);conns=conns.filter(c=>c.from!==id&&c.to!==id);
  document.getElementById('n-'+id)?.remove()});selNodes.clear();renderConns();broadcastState();addActivity('ลบกล่อง')}

// ══════════ LOCK SYSTEM ══════════
function lockNode(nid){
  const n=nodes.find(x=>x.id===nid);if(!n||n.lockedBy===me.id)return;
  if(n.lockedBy&&n.lockedBy!==me.id)return;
  n.lockedBy=me.id;renderNode(n);renderConns();broadcastState()
}
function unlockNode(nid){
  const n=nodes.find(x=>x.id===nid);if(!n||n.lockedBy!==me.id)return;
  setTimeout(()=>{if(document.activeElement?.closest('#n-'+nid))return;
    n.lockedBy=null;renderNode(n);renderConns();broadcastState()},300)
}

// ══════════ DETAIL PANEL ══════════
function openDetail(nodeId,bulletIdx){
  detailOpen={nodeId,bulletIdx};
  const n=nodes.find(x=>x.id===nodeId);if(!n)return;
  const b=n.bullets[bulletIdx];if(!b)return;
  const panel=document.getElementById('detail-panel');panel.classList.add('open');
  document.getElementById('dp-dot').style.background=n.color;
  document.getElementById('dp-title').textContent=b.text||'(รายการที่ '+(bulletIdx+1)+')';
  const body=document.getElementById('dp-body');
  body.innerHTML='';

  // Parent node info
  body.innerHTML+=`<div class="dp-section"><div class="dp-label">กล่อง</div><div style="font-size:13px;color:var(--text-primary);font-weight:500">${n.title||'(ไม่มีชื่อ)'}</div></div>`;

  // Status
  const statusSec=document.createElement('div');statusSec.className='dp-section';
  statusSec.innerHTML='<div class="dp-label">สถานะ</div>';
  const sbar=document.createElement('div');sbar.className='status-bar';
  [{k:'',l:'ไม่กำหนด',c:''},{k:'todo',l:'📋 รอทำ',c:'active-todo'},{k:'doing',l:'⚡ กำลังทำ',c:'active-doing'},{k:'done',l:'✅ เสร็จแล้ว',c:'active-done'}]
    .forEach(s=>{const btn=document.createElement('button');btn.className='status-opt'+(b.status===s.k?' '+s.c:'');btn.textContent=s.l;
      btn.addEventListener('click',()=>{b.status=s.k;openDetail(nodeId,bulletIdx);renderNode(n);broadcastState();addActivity(`เปลี่ยนสถานะ "${b.text}" เป็น ${s.l}`)});
      sbar.appendChild(btn)});
  statusSec.appendChild(sbar);body.appendChild(statusSec);

  // Description
  const descSec=document.createElement('div');descSec.className='dp-section';
  descSec.innerHTML='<div class="dp-label">คำอธิบาย</div>';
  const ta=document.createElement('textarea');ta.className='dp-textarea';ta.value=b.desc||'';ta.placeholder='อธิบายรายละเอียดเพิ่มเติม เช่น ขั้นตอนการทำงาน, เงื่อนไข, หมายเหตุ...';
  ta.addEventListener('input',()=>{b.desc=ta.value;updateBulletVisual(nodeId,bulletIdx);broadcastState()});
  descSec.appendChild(ta);body.appendChild(descSec);

  // Sub-items
  const subSec=document.createElement('div');subSec.className='dp-section';
  subSec.innerHTML='<div class="dp-label">หมวดย่อย / รายการย่อย</div>';
  const subList=document.createElement('div');subList.className='sub-list';

  function renderSubs(){
    subList.innerHTML='';
    (b.subs||[]).forEach((s,i)=>{
      const row=document.createElement('div');row.className='sub-row';
      const chk=document.createElement('button');chk.className='sub-check'+(s.done?' done':'');chk.textContent='✓';
      chk.addEventListener('click',()=>{s.done=!s.done;renderSubs();broadcastState()});
      const inp=document.createElement('input');inp.value=s.text;inp.placeholder='รายละเอียดย่อย...';
      inp.addEventListener('input',()=>{s.text=inp.value;broadcastState()});
      inp.addEventListener('keydown',e=>{if(e.key==='Enter'){b.subs.splice(i+1,0,{text:'',done:false});renderSubs();
        subList.querySelectorAll('input')[i+1]?.focus();broadcastState()}});
      const rm=document.createElement('button');rm.className='sub-rm';rm.textContent='×';
      rm.addEventListener('click',()=>{b.subs.splice(i,1);renderSubs();broadcastState()});
      row.append(chk,inp,rm);subList.appendChild(row)
    });
  }
  renderSubs();
  subSec.appendChild(subList);

  const addSub=document.createElement('button');addSub.className='add-sub';
  addSub.innerHTML='<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> เพิ่มรายการย่อย';
  addSub.addEventListener('click',()=>{if(!b.subs)b.subs=[];b.subs.push({text:'',done:false});renderSubs();updateBulletVisual(nodeId,bulletIdx);
    subList.querySelectorAll('input')[b.subs.length-1]?.focus();broadcastState()});
  subSec.append(addSub);body.appendChild(subSec);
}

function closeDetail(){document.getElementById('detail-panel').classList.remove('open');detailOpen=null}

function updateBulletVisual(nodeId,bulletIdx){
  const n=nodes.find(x=>x.id===nodeId);if(!n)return;
  const el=document.getElementById('n-'+nodeId);if(!el)return;
  const rows=el.querySelectorAll('.bullet-row');
  if(rows[bulletIdx]){const b=n.bullets[bulletIdx];rows[bulletIdx].classList.toggle('has-detail',!!(b.desc||b.subs?.length))}
}

// ══════════ CONNECTIONS ══════════
function toggleConn(f){connMode=f!==undefined?f:!connMode;cFrom=null;cPort=null;tSvg.querySelector('path').setAttribute('d','');
  document.getElementById('conn-btn').classList.toggle('on',connMode);cc.classList.toggle('connecting',connMode)}
function onPortDown(e){if(!connMode)return;e.stopPropagation();cFrom=+e.target.dataset.nid;cPort=e.target.dataset.port;e.target.classList.add('on')}
function onPortUp(e){if(!connMode||!cFrom)return;e.stopPropagation();const to=+e.target.dataset.nid,tp=e.target.dataset.port;
  if(cFrom!==to&&!conns.find(c=>(c.from===cFrom&&c.to===to)||(c.from===to&&c.to===cFrom))){
    conns.push({id:CID++,from:cFrom,fromPort:cPort,to,toPort:tp,label:''});renderConns();broadcastState();
    addActivity(`เชื่อมต่อ "${nodes.find(n=>n.id===cFrom)?.title||'?'}" → "${nodes.find(n=>n.id===to)?.title||'?'}"`)
  }
  document.querySelectorAll('.port.on').forEach(p=>p.classList.remove('on'));cFrom=null;cPort=null;tSvg.querySelector('path').setAttribute('d','')}

function portPos(nid,port){const e=document.getElementById('n-'+nid);const n=nodes.find(x=>x.id===nid);if(!e||!n)return{x:0,y:0};
  const w=e.offsetWidth,h=e.offsetHeight;
  switch(port){case'top':return{x:n.x+w/2,y:n.y};case'bottom':return{x:n.x+w/2,y:n.y+h};case'left':return{x:n.x,y:n.y+h/2};case'right':return{x:n.x+w,y:n.y+h/2};default:return{x:n.x+w/2,y:n.y+h/2}}}

function curvePath(x1,y1,x2,y2){const d=Math.max(Math.abs(x2-x1),Math.abs(y2-y1),50)*0.4;
  if(Math.abs(y2-y1)>Math.abs(x2-x1))return`M${x1},${y1} C${x1},${y1+d} ${x2},${y2-d} ${x2},${y2}`;
  return`M${x1},${y1} C${x1+d},${y1} ${x2-d},${y2} ${x2},${y2}`}

function renderConns(){
  cSvg.innerHTML='';document.querySelectorAll('.conn-label').forEach(l=>l.remove());
  conns.forEach(c=>{
    const fp=portPos(c.from,c.fromPort),tp=portPos(c.to,c.toPort);
    const fn=nodes.find(n=>n.id===c.from),tn=nodes.find(n=>n.id===c.to);if(!fn||!tn)return;
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',curvePath(fp.x,fp.y,tp.x,tp.y));p.setAttribute('stroke',fn.color);p.setAttribute('stroke-width','2.5');p.setAttribute('fill','none');p.setAttribute('stroke-opacity','0.6');p.style.color=fn.color;
    const a=Math.atan2(tp.y-fp.y,tp.x-fp.x),al=9;
    const ar=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    ar.setAttribute('points',`${tp.x},${tp.y} ${tp.x-al*Math.cos(a-Math.PI/6)},${tp.y-al*Math.sin(a-Math.PI/6)} ${tp.x-al*Math.cos(a+Math.PI/6)},${tp.y-al*Math.sin(a+Math.PI/6)}`);
    ar.setAttribute('fill',fn.color);ar.setAttribute('fill-opacity','0.6');
    p.addEventListener('click',e=>{e.stopPropagation();showConnMenu(c,e)});
    cSvg.append(p,ar);
    if(c.label){const lbl=document.createElement('div');lbl.className='conn-label';lbl.textContent=c.label;
      lbl.style.left=((fp.x+tp.x)/2-20)+'px';lbl.style.top=((fp.y+tp.y)/2-12)+'px';
      lbl.addEventListener('click',e=>{e.stopPropagation();const nl=prompt('ป้ายกำกับ:',c.label);if(nl!==null){c.label=nl;renderConns();broadcastState()}});
      cv.appendChild(lbl)}
  });updateMM()
}

// ══════════ MENUS ══════════
function closeMenus(){document.querySelectorAll('.ctx').forEach(m=>m.remove())}
document.addEventListener('click',e=>{if(!e.target.closest('.ctx')&&!e.target.closest('.nd-mbtn'))closeMenus()});

function showNodeMenu(n,e){
  closeMenus();const m=document.createElement('div');m.className='ctx';m.style.left=e.clientX+'px';m.style.top=e.clientY+'px';
  const ct=document.createElement('div');ct.style.cssText='padding:5px 10px;font-size:10px;color:var(--text-dim);font-weight:500';ct.textContent='สีกล่อง';m.appendChild(ct);
  const cp=document.createElement('div');cp.className='ctx-colors';
  COLORS.forEach(c=>{const s=document.createElement('div');s.className='ctx-cs'+(n.color===c.v?' on':'');s.style.background=c.v;s.title=c.n;
    s.addEventListener('click',()=>{n.color=c.v;renderNode(n);renderConns();closeMenus();broadcastState();addActivity(`เปลี่ยนสี "${n.title}" เป็น ${c.n}`)});cp.appendChild(s)});
  m.appendChild(cp);m.appendChild(mkSep());
  m.appendChild(mkItem('ทำสำเนา',()=>{addNode(n.x+30,n.y+30,n.title+' (copy)',n.color,n.bullets.map(b=>({...b,subs:[...(b.subs||[]).map(s=>({...s}))]})));closeMenus()}));
  m.appendChild(mkItem('เพิ่มป้ายกำกับเส้น',()=>{const cs=conns.filter(c=>c.from===n.id||c.to===n.id);
    if(!cs.length){toast('ยังไม่มีเส้นเชื่อม');closeMenus();return}
    cs.forEach(c=>{const o=c.from===n.id?c.to:c.from;const on=nodes.find(x=>x.id===o);
      const nl=prompt(`ป้ายกำกับ → ${on?.title||'?'}:`,c.label);if(nl!==null)c.label=nl});
    renderConns();broadcastState();closeMenus()}));
  m.appendChild(mkSep());
  const del=mkItem('ลบกล่อง',()=>{nodes=nodes.filter(x=>x.id!==n.id);conns=conns.filter(c=>c.from!==n.id&&c.to!==n.id);
    selNodes.delete(n.id);document.getElementById('n-'+n.id)?.remove();renderConns();broadcastState();closeMenus();addActivity(`ลบกล่อง "${n.title}"`)});
  del.classList.add('danger');m.appendChild(del);
  document.body.appendChild(m);
  const mr=m.getBoundingClientRect();if(mr.right>innerWidth)m.style.left=(innerWidth-mr.width-8)+'px';if(mr.bottom>innerHeight)m.style.top=(innerHeight-mr.height-8)+'px'
}

function showConnMenu(c,e){
  closeMenus();const m=document.createElement('div');m.className='ctx';m.style.left=e.clientX+'px';m.style.top=e.clientY+'px';
  m.appendChild(mkItem('แก้ไขป้ายกำกับ',()=>{const nl=prompt('ป้ายกำกับ:',c.label);if(nl!==null){c.label=nl;renderConns();broadcastState()}closeMenus()}));
  const del=mkItem('ลบเส้นเชื่อม',()=>{conns=conns.filter(x=>x.id!==c.id);renderConns();broadcastState();closeMenus()});
  del.classList.add('danger');m.appendChild(del);document.body.appendChild(m)
}

function mkItem(t,fn){const b=document.createElement('button');b.className='ctx-i';b.textContent=t;b.addEventListener('click',e=>{e.stopPropagation();fn()});return b}
function mkSep(){const d=document.createElement('div');d.className='ctx-sep';return d}

// ══════════ ACTIVITY LOG ══════════
function addActivity(text){
  activities.unshift({user:me.name,color:me.color,text,time:new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})});
  if(activities.length>50)activities.pop();
  renderActivities();
  if(bc)bc.postMessage({type:'activity',user:me.name,color:me.color,text,time:activities[0].time})
}

function renderActivities(){
  const list=document.getElementById('act-list');list.innerHTML='';
  activities.forEach(a=>{
    const item=document.createElement('div');item.className='act-item';
    item.innerHTML=`<div class="act-ava" style="background:${a.color}">${a.user.charAt(0).toUpperCase()}</div>
      <div class="act-content"><strong>${esc(a.user)}</strong> ${esc(a.text)}<div class="act-time">${a.time}</div></div>`;
    list.appendChild(item)
  })
}

function toggleActivity(){const p=document.getElementById('activity-panel');p.classList.toggle('open');
  document.getElementById('act-btn').classList.toggle('on',p.classList.contains('open'))}

// ══════════ PRESENCE / BROADCAST ══════════
function broadcastPresence(){
  if(bc)bc.postMessage({type:'presence',user:me});
  updatePresenceBar()
}

function updatePresenceBar(){
  const bar=document.getElementById('presence-bar');bar.innerHTML='';
  // Me first
  const meAv=document.createElement('div');meAv.className='user-avatar me';meAv.style.background=me.color;
  meAv.textContent=me.name.charAt(0).toUpperCase();
  meAv.innerHTML+=`<div class="tooltip">${esc(me.name)} (คุณ)</div>`;
  bar.appendChild(meAv);
  // Others
  Object.values(teamUsers).forEach(u=>{
    const av=document.createElement('div');av.className='user-avatar';av.style.background=u.color;
    av.textContent=u.name.charAt(0).toUpperCase();
    av.innerHTML+=`<div class="tooltip">${esc(u.name)}</div>`;
    bar.appendChild(av)
  })
}

function broadcastState(){
  autoSave();
  if(bc)bc.postMessage({type:'state',nodes,conns,NID,CID,sender:me.id})
}

if(bc){
  bc.onmessage=e=>{
    const d=e.data;
    if(d.type==='presence'){
      if(d.user.id!==me.id){teamUsers[d.user.id]=d.user;updatePresenceBar();
        bc.postMessage({type:'presence-reply',user:me})}
    }
    if(d.type==='presence-reply'){
      if(d.user.id!==me.id){teamUsers[d.user.id]=d.user;updatePresenceBar()}
    }
    if(d.type==='state'&&d.sender!==me.id){
      nodes=d.nodes;conns=d.conns;NID=d.NID;CID=d.CID;
      document.querySelectorAll('.nd').forEach(n=>n.remove());
      document.querySelectorAll('.conn-label').forEach(l=>l.remove());
      nodes.forEach(n=>renderNode(n));renderConns();updateTx();
      if(detailOpen)openDetail(detailOpen.nodeId,detailOpen.bulletIdx)
    }
    if(d.type==='activity'){
      activities.unshift({user:d.user,color:d.color,text:d.text,time:d.time});
      if(activities.length>50)activities.pop();renderActivities()
    }
  };
  setInterval(broadcastPresence,5000)
}

// ══════════ SAVE / LOAD ══════════
function autoSave(){try{localStorage.setItem('bld2',JSON.stringify({nodes,conns,NID,CID,view:{S,PX,PY}}))}catch(e){}}
function autoLoad(){try{const r=localStorage.getItem('bld2');if(!r)return false;const d=JSON.parse(r);
  nodes=d.nodes||[];conns=d.conns||[];NID=d.NID||1;CID=d.CID||1;
  if(d.view){S=d.view.S||1;PX=d.view.PX||0;PY=d.view.PY||0}
  // Migrate old bullets
  nodes.forEach(n=>{n.bullets=n.bullets.map(b=>typeof b==='string'?{text:b,desc:'',subs:[],status:''}:b)});
  nodes.forEach(n=>renderNode(n));renderConns();updateTx();return nodes.length>0}catch(e){return false}}
setInterval(autoSave,4000);

function saveFile(){
  const d={version:2,nodes,conns,NID,CID,view:{S,PX,PY},activities:activities.slice(0,20)};
  const blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='logic-design-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(a.href);toast('💾 บันทึกสำเร็จ — แชร์ไฟล์นี้ให้ทีมได้');addActivity('บันทึกไฟล์')
}
function loadFile(){document.getElementById('fi').click()}
document.getElementById('fi').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=ev=>{try{const d=JSON.parse(ev.target.result);
    document.querySelectorAll('.nd').forEach(n=>n.remove());document.querySelectorAll('.conn-label').forEach(l=>l.remove());cSvg.innerHTML='';
    nodes=d.nodes||[];conns=d.conns||[];NID=d.NID||1;CID=d.CID||1;
    nodes.forEach(n=>{n.bullets=n.bullets.map(b=>typeof b==='string'?{text:b,desc:'',subs:[],status:''}:b)});
    if(d.view){S=d.view.S||1;PX=d.view.PX||0;PY=d.view.PY||0}
    if(d.activities)activities=d.activities;
    nodes.forEach(n=>renderNode(n));renderConns();updateTx();renderActivities();
    toast('📂 โหลดสำเร็จ');addActivity('โหลดไฟล์')}catch(err){toast('ไฟล์ไม่ถูกต้อง')}};
  r.readAsText(f);e.target.value=''
});

// ══════════ EXPORT ══════════
function exportMap(){
  let o='═══════════════════════════════════════\n  BUSINESS LOGIC MAP\n  '+new Date().toLocaleString('th-TH')+'\n═══════════════════════════════════════\n\n';
  const cg={};nodes.forEach(n=>{const cn=COLORS.find(c=>c.v===n.color)?.n||n.color;if(!cg[cn])cg[cn]=[];cg[cn].push(n)});
  o+='[ กล่องแนวคิดทั้งหมด ]\n\n';
  Object.entries(cg).forEach(([cn,g])=>{o+=`── กลุ่ม: ${cn} ──\n`;
    g.forEach(n=>{o+=`  ■ ${n.title||'(ไม่มีชื่อ)'}\n`;
      n.bullets.filter(b=>b.text?.trim()).forEach(b=>{
        const st=b.status==='todo'?' [รอทำ]':b.status==='doing'?' [กำลังทำ]':b.status==='done'?' [เสร็จ]':'';
        o+=`    • ${b.text}${st}\n`;
        if(b.desc)o+=`      ↳ คำอธิบาย: ${b.desc}\n`;
        (b.subs||[]).filter(s=>s.text).forEach(s=>{o+=`      ${s.done?'☑':'☐'} ${s.text}\n`})
      })});o+='\n'});
  o+='[ เส้นทางการทำงาน ]\n\n';
  if(!conns.length)o+='  (ยังไม่มีเส้นเชื่อม)\n';
  else conns.forEach(c=>{const fn=nodes.find(n=>n.id===c.from),tn=nodes.find(n=>n.id===c.to);
    o+=`  ${fn?.title||'?'}  ──→  ${tn?.title||'?'}${c.label?' ['+c.label+']':''}\n`});
  o+=`\n[ สรุป ]\n  กล่อง: ${nodes.length}  |  เส้นเชื่อม: ${conns.length}  |  กลุ่มสี: ${Object.keys(cg).length}\n`;
  if(nodes.length){const cc2={};conns.forEach(c=>{cc2[c.from]=(cc2[c.from]||0)+1;cc2[c.to]=(cc2[c.to]||0)+1});
    const sorted=Object.entries(cc2).sort((a,b)=>b[1]-a[1]);
    if(sorted.length){o+='\n  กล่องที่เชื่อมต่อมากที่สุด:\n';sorted.slice(0,3).forEach(([id,cnt])=>{const n=nodes.find(x=>x.id===+id);o+=`    • ${n?.title||'?'} (${cnt} เส้น)\n`})}}
  o+='\n═══════════════════════════════════════\n';

  const ov=document.createElement('div');ov.className='modal-o';ov.addEventListener('click',e=>{if(e.target===ov)ov.remove()});
  ov.innerHTML=`<div class="modal"><div class="mod-h"><h2>📋 Export Logical Map</h2><button class="mod-x" onclick="this.closest('.modal-o').remove()">×</button></div>
    <div class="mod-b"><pre>${esc(o)}</pre></div>
    <div class="mod-f"><button class="tb" onclick="this.closest('.modal-o').remove()">ปิด</button><button class="tb primary" onclick="copyExp(this)">📋 คัดลอก</button></div></div>`;
  document.body.appendChild(ov)
}
function copyExp(btn){const t=btn.closest('.modal').querySelector('pre').textContent;navigator.clipboard.writeText(t).then(()=>{btn.textContent='✓ คัดลอกแล้ว!';setTimeout(()=>btn.innerHTML='📋 คัดลอก',1500)})}

// ══════════ MINIMAP ══════════
function updateMM(){const mc=document.getElementById('mm-c'),ctx=mc.getContext('2d');mc.width=160;mc.height=100;ctx.clearRect(0,0,160,100);
  if(!nodes.length)return;let x1=1e9,y1=1e9,x2=-1e9,y2=-1e9;
  nodes.forEach(n=>{x1=Math.min(x1,n.x);y1=Math.min(y1,n.y);x2=Math.max(x2,n.x+220);y2=Math.max(y2,n.y+120)});
  const p=40,w=x2-x1+p*2,h=y2-y1+p*2,s=Math.min(150/w,90/h),ox=(160-w*s)/2-(x1-p)*s,oy=(100-h*s)/2-(y1-p)*s;
  ctx.strokeStyle='rgba(124,106,239,.25)';ctx.lineWidth=1;
  conns.forEach(c=>{const fn=nodes.find(n=>n.id===c.from),tn=nodes.find(n=>n.id===c.to);if(!fn||!tn)return;
    ctx.beginPath();ctx.moveTo(fn.x*s+ox+5,fn.y*s+oy+3);ctx.lineTo(tn.x*s+ox+5,tn.y*s+oy+3);ctx.stroke()});
  nodes.forEach(n=>{ctx.fillStyle=n.color+'88';ctx.fillRect(n.x*s+ox,n.y*s+oy,10,6)});
  const cw=cc.clientWidth,ch=cc.clientHeight;ctx.strokeStyle='rgba(255,255,255,.25)';ctx.strokeRect((-PX/S)*s+ox,(-PY/S)*s+oy,(cw/S)*s,(ch/S)*s)}

// ══════════ UTILS ══════════
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s'},2000);setTimeout(()=>t.remove(),2400)}

// ══════════ INIT ══════════
function initApp(){
  const loaded=autoLoad();
  if(!loaded){
    const n1=addNode(300,200,'แผนกขาย','#ef4444',[{text:'รับออเดอร์ลูกค้า',desc:'ลูกค้าสั่งซื้อผ่านหน้าร้านหรือออนไลน์ พนักงานรับออเดอร์และบันทึกลงระบบ',subs:[{text:'ตรวจสอบสินค้าคงเหลือ',done:false},{text:'ยืนยันราคากับลูกค้า',done:false}],status:'doing'},
      {text:'ออกใบเสนอราคา',desc:'',subs:[],status:''},{text:'ติดตามยอดขาย',desc:'',subs:[],status:''}]);
    const n2=addNode(660,180,'สินค้า/สต็อก','#22c55e',[{text:'รายการสินค้า',desc:'',subs:[],status:''},{text:'จำนวนคงเหลือ',desc:'',subs:[],status:''},{text:'จุดสั่งซื้อ',desc:'',subs:[],status:''}]);
    const n3=addNode(300,460,'ใบส่งของ','#f97316',[{text:'เลขที่เอกสาร',desc:'',subs:[],status:''},{text:'รายการที่ส่ง',desc:'',subs:[],status:''},{text:'ลูกค้าปลายทาง',desc:'',subs:[],status:''}]);
    const n4=addNode(660,460,'บัญชี','#3b82f6',[{text:'บันทึกรายรับ',desc:'',subs:[],status:''},{text:'ออกใบกำกับภาษี',desc:'',subs:[],status:''},{text:'ตรวจสอบยอดเงิน',desc:'',subs:[],status:''}]);
    conns.push({id:CID++,from:n1.id,fromPort:'right',to:n2.id,toPort:'left',label:'ตรวจสต็อก'});
    conns.push({id:CID++,from:n1.id,fromPort:'bottom',to:n3.id,toPort:'top',label:'สร้างใบส่ง'});
    conns.push({id:CID++,from:n3.id,fromPort:'right',to:n4.id,toPort:'left',label:'ส่งข้อมูลบัญชี'});
    conns.push({id:CID++,from:n2.id,fromPort:'bottom',to:n4.id,toPort:'top',label:'อัพเดตต้นทุน'});
    renderConns();fitView()
  }
  renderActivities();updatePresenceBar()
}

// Check if user exists
try{const saved=localStorage.getItem('bld_me');if(saved){me=JSON.parse(saved);initApp();broadcastPresence();addActivity('กลับเข้ามาทำงาน')}else{showOnboard()}}catch(e){showOnboard()}
